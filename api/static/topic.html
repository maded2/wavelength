<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Wavelength — Topic</title>
    <style>
        /* ── Theme Variables ── */
        [data-theme="light"] {
            --bg:              #f5f5f5;
            --bg-surface:      #ffffff;
            --text:            #333333;
            --text-muted:      #888888;
            --text-heading:    #1a1a2e;
            --border:          #e5e5e5;
            --accent:          #4f46e5;
            --accent-hover:    #4338ca;
            --accent-muted:    rgba(79,70,229,0.15);
            --input-bg:        #ffffff;
            --input-border:    #d1d5db;
            --btn-sec-bg:      #ffffff;
            --btn-sec-text:    #333333;
            --btn-sec-border:  #d1d5db;
            --btn-sec-hover:   #f9fafb;
            --danger:          #dc2626;
            --danger-border:   #fca5a5;
            --danger-hover:    #fef2f2;
            --msg-user-bg:     #4f46e5;
            --msg-user-text:   #ffffff;
            --msg-asst-bg:     #ffffff;
            --msg-asst-text:   #333333;
            --msg-asst-border: #e5e5e5;
            --badge-active-bg: #dbeafe;
            --badge-active-text: #1d4ed8;
            --badge-done-bg: #dcfce7;
            --badge-done-text: #15803d;
            --badge-inactive-bg: #f3f4f6;
            --badge-inactive-text: #6b7280;
        }

        [data-theme="dark"] {
            --bg:              #0f0f14;
            --bg-surface:      #1a1a24;
            --text:            #d4d4d8;
            --text-muted:      #71717a;
            --text-heading:    #f0f0f5;
            --border:          #2e2e3a;
            --accent:          #818cf8;
            --accent-hover:    #6366f1;
            --accent-muted:    rgba(129,140,248,0.2);
            --input-bg:        #1e1e2a;
            --input-border:    #3a3a4a;
            --btn-sec-bg:      #1e1e2a;
            --btn-sec-text:    #d4d4d8;
            --btn-sec-border:  #3a3a4a;
            --btn-sec-hover:   #2a2a3a;
            --danger:          #f87171;
            --danger-border:   #7f1d1d;
            --danger-hover:    #1c1017;
            --msg-user-bg:     #6366f1;
            --msg-user-text:   #ffffff;
            --msg-asst-bg:     #1e1e2a;
            --msg-asst-text:   #d4d4d8;
            --msg-asst-border: #3a3a4a;
            --badge-active-bg: #1e3a5f;
            --badge-active-text: #93c5fd;
            --badge-done-bg: #14532d;
            --badge-done-text: #86efac;
            --badge-inactive-bg: #27272a;
            --badge-inactive-text: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: var(--bg-surface);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.3s, border-color 0.3s;
        }
        .header a { color: var(--accent); text-decoration: none; font-size: 14px; }
        .header a:hover { text-decoration: underline; }
        .header h1 { font-size: 18px; color: var(--text-heading); flex: 1; }
        .status-badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; }
        .status-active { background: var(--badge-active-bg); color: var(--badge-active-text); }
        .status-completed { background: var(--badge-done-bg); color: var(--badge-done-text); }
        .status-not-started { background: var(--badge-inactive-bg); color: var(--badge-inactive-text); }

        .theme-toggle {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.3s, border-color 0.3s;
        }
        .theme-toggle:hover { background: var(--btn-sec-hover); }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: var(--msg-user-bg);
            color: var(--msg-user-text);
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--msg-asst-bg);
            color: var(--msg-asst-text);
            border: 1px solid var(--msg-asst-border);
            border-bottom-left-radius: 4px;
        }
        .message .meta { font-size: 11px; opacity: 0.7; margin-top: 6px; }
        .empty-chat { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-chat p { margin-top: 8px; }

        .input-area {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            transition: background 0.3s, border-color 0.3s;
        }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        .input-wrapper textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 150px;
            outline: none;
            line-height: 1.4;
            background: var(--input-bg);
            color: var(--text);
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        .input-wrapper textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-muted);
        }
        .input-wrapper button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .input-wrapper button:hover { background: var(--accent-hover); }
        .input-wrapper button:disabled { background: var(--accent-muted); cursor: not-allowed; }

        .actions { max-width: 800px; margin: 0 auto; padding: 8px 20px; display: flex; gap: 8px; }
        .actions button {
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            border: 1px solid var(--btn-sec-border);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .actions button:hover { background: var(--btn-sec-hover); border-color: var(--accent); }
        .actions button.danger { color: var(--danger); border-color: var(--danger-border); }
        .actions button.danger:hover { background: var(--danger-hover); }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← Topics</a>
        <h1 id="topic-name">Loading...</h1>
        <span id="topic-status" class="status-badge status-not-started">not_started</span>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
    </div>

    <div class="actions" id="actions-bar">
        <button id="btn-complete" onclick="setStatus('completed')">Complete</button>
        <button id="btn-reopen" onclick="setStatus('active')">Reopen</button>
        <button id="btn-delete" class="danger" onclick="deleteTopic()">Delete</button>
    </div>

    <div class="chat-area" id="chat-area">
        <div class="empty-chat">Loading topic...</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // ── Theme ──
        (function() {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = stored || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateIcon(theme);

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                updateIcon(next);
            });

            function updateIcon(theme) {
                document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        })();

        const topicId = window.location.pathname.split('/').pop();
        let currentTopic = null;

        // Auto-resize textarea
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function loadTopic() {
            try {
                const res = await fetch('/api/topics/' + topicId);
                if (!res.ok) {
                    document.getElementById('chat-area').innerHTML = '<div class="empty-chat"><p>Topic not found</p></div>';
                    return;
                }
                currentTopic = await res.json();
                document.getElementById('topic-name').textContent = currentTopic.name;
                document.getElementById('page-title').textContent = 'Wavelength — ' + currentTopic.name;

                const badge = document.getElementById('topic-status');
                badge.textContent = currentTopic.status;
                badge.className = 'status-badge status-' + currentTopic.status;

                // Show/hide action buttons based on status
                document.getElementById('btn-complete').style.display = currentTopic.status === 'completed' ? 'none' : '';
                document.getElementById('btn-reopen').style.display = currentTopic.status !== 'completed' ? 'none' : '';

                renderMessages(currentTopic.messages || []);
            } catch (e) {
                console.error('Failed to load topic:', e);
                document.getElementById('chat-area').innerHTML = '<div class="empty-chat"><p>Failed to load topic</p></div>';
            }
        }

        function renderMessages(messages) {
            const area = document.getElementById('chat-area');
            if (messages.length === 0) {
                area.innerHTML = '<div class="empty-chat"><h3>No messages yet</h3><p>Start the conversation by sending a message below.</p></div>';
                return;
            }
            area.innerHTML = messages.map(m => `
                <div class="message ${m.role}">
                    ${escapeHtml(m.content)}
                    <div class="meta">${m.role} · ${formatTime(m.timestamp)}</div>
                </div>
            `).join('');
            area.scrollTop = area.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';
            input.value = '';
            input.style.height = 'auto';

            try {
                const res = await fetch('/api/topics/' + topicId + '/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.message || 'Failed to send message');
                } else if (data.success === false) {
                    alert(data.error || 'LLM unavailable, but your message was saved.');
                }

                // Reload the topic to get updated messages
                await loadTopic();
            } catch (e) {
                alert('Failed to send message: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
                input.focus();
            }
        }

        async function setStatus(status) {
            try {
                const res = await fetch('/api/topics/' + topicId, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) {
                    await loadTopic();
                } else {
                    const err = await res.json();
                    alert(err.message || 'Failed to update status');
                }
            } catch (e) {
                alert('Failed to update status: ' + e.message);
            }
        }

        async function deleteTopic() {
            if (!confirm('Delete this topic and all its data? This cannot be undone.')) return;
            try {
                const res = await fetch('/api/topics/' + topicId, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const err = await res.json();
                    alert(err.message || 'Failed to delete topic');
                }
            } catch (e) {
                alert('Failed to delete topic: ' + e.message);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.toLocaleString();
        }

        loadTopic();
    </script>
</body>
</html>
